services:
  caddy:
    build: .
    cap_add:
      - NET_ADMIN
    container_name: caddy
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      - PROMETHEUS_HASHED_PASSWORD=${PROMETHEUS_HASHED_PASSWORD}
      - PROMETHEUS_AUTH_USERNAME=${ALLOY_PROMETHEUS_USERNAME}
      - MCP_ACCESS_TOKEN=${MCP_ACCESS_TOKEN}
    image: caddy:2.11.2@sha256:25cdc846626b62d05f6b633b9b40c2c9f6ef89b515dc76133cefd920f7dbe562
    networks:
      - stzky-ingress
    ports:
      - 443:443
      - 443:443/udp
      - 80:80
    restart: always
    volumes:
      - caddy_config:/config
      - caddy_data:/data
      - ./config/caddy:/etc/caddy:ro

volumes:
  caddy_config:
  caddy_data:

networks:
  stzky-ingress:
    external: true
