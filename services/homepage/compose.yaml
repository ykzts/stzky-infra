services:
  homepage:
    container_name: homepage
    environment:
      HOMEPAGE_ALLOWED_HOSTS: stzky.com
      LOG_TARGETS: stdout
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 20s
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3000/api/healthcheck']
      timeout: 3s
    image: ghcr.io/gethomepage/homepage:v1.13.2@sha256:a0b71c8e757298d02560186bab9fbe3fc2d375c523a62cc1019177b37e48aa28
    networks:
      - default
      - stzky-ingress
    restart: always
    volumes:
      - ./config/homepage:/app/config:ro
      - ./public/images:/app/public/images:ro

networks:
  stzky-ingress:
    external: true
