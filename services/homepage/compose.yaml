services:
  homepage:
    container_name: homepage
    environment:
      HOMEPAGE_ALLOWED_HOSTS: stzky.com
      LOG_TARGETS: stdout
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 20s
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3000/api/healthcheck']
      timeout: 3s
    image: ghcr.io/gethomepage/homepage:v1.13.1@sha256:d8d784e5090111b6e4c56dfd90e272d2953a2094e87349f647165df0fa6c4401
    networks:
      - default
      - stzky-ingress
    restart: always
    volumes:
      - ./config/homepage:/app/config:ro
      - ./public/images:/app/public/images:ro

networks:
  stzky-ingress:
    external: true
