services:
  firecrawl:
    command: ['node', 'dist/src/harness.js', '--start-docker']
    container_name: firecrawl
    image: ghcr.io/firecrawl/firecrawl:2.10.22@sha256:44f8e44e5cb7427c6e5759ec8f88950dfac2b4ee042ad00987303f53e69b96bc
    environment:
      HOST: 0.0.0.0
      PORT: 3002
      USE_DB_AUTHENTICATION: false
      REDIS_URL: redis://firecrawl-redis:6379
      REDIS_RATE_LIMIT_URL: redis://firecrawl-redis:6379
      PLAYWRIGHT_MICROSERVICE_URL: http://firecrawl-playwright:3000/scrape
      NUQ_RABBITMQ_URL: amqp://firecrawl-rabbitmq:5672
      POSTGRES_HOST: firecrawl-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${FIRECRAWL_POSTGRES_USER:-firecrawl}
      POSTGRES_PASSWORD: ${FIRECRAWL_POSTGRES_PASSWORD:-firecrawl_password}
      POSTGRES_DB: ${FIRECRAWL_POSTGRES_DB:-firecrawl}
      BULL_AUTH_KEY: ${FIRECRAWL_BULL_AUTH_KEY:-CHANGEME}
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 60s
      test: ['CMD', 'node', '-e', 'fetch(''http://127.0.0.1:3002/e2e-test'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))']
      timeout: 5s
    depends_on:
      firecrawl-redis:
        condition: service_started
      firecrawl-rabbitmq:
        condition: service_healthy
      firecrawl-playwright:
        condition: service_started
      firecrawl-postgres:
        condition: service_healthy
    networks:
      - default
      - stzky-ingress
    cpus: 2
    init: true
    mem_limit: 4g
    restart: always
    security_opt:
      - no-new-privileges

  firecrawl-playwright:
    container_name: firecrawl-playwright
    image: ghcr.io/firecrawl/playwright-service:latest@sha256:6359b0d9070f27400b4a9b615509be06919e40121fc1fdc42d4efeddf02653d2
    environment:
      PORT: 3000
    cpus: 1
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 30s
      test: ['CMD', 'node', '-e', 'fetch(''http://127.0.0.1:3000/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))']
      timeout: 5s
    init: true
    mem_limit: 2g
    restart: always
    security_opt:
      - no-new-privileges

  firecrawl-redis:
    command: ['redis-server', '--bind', '0.0.0.0']
    container_name: firecrawl-redis
    cpus: 1
    image: redis:8.8-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    healthcheck:
      interval: 5s
      retries: 5
      test: ['CMD', 'redis-cli', 'ping']
      timeout: 5s
    init: true
    mem_limit: 1g
    restart: always
    security_opt:
      - no-new-privileges

  firecrawl-rabbitmq:
    container_name: firecrawl-rabbitmq
    image: rabbitmq:4.3.2-management-alpine@sha256:e6862a7d804c80fc72d2265aed3b725fd9a6afd330b735363eeecc4b6ec4dd3d
    init: true
    restart: always
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'check_running']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    cpus: 1
    mem_limit: 1g
    security_opt:
      - no-new-privileges

  firecrawl-postgres:
    command: ['postgres', '-c', 'cron.database_name=firecrawl']
    container_name: firecrawl-postgres
    image: ghcr.io/firecrawl/nuq-postgres:latest@sha256:f9388bd25ae2e1f1d034518236f993ce236173c1d8800ce24092ea6643a95a33
    environment:
      POSTGRES_USER: ${FIRECRAWL_POSTGRES_USER:-firecrawl}
      POSTGRES_PASSWORD: ${FIRECRAWL_POSTGRES_PASSWORD:-firecrawl_password}
      POSTGRES_DB: ${FIRECRAWL_POSTGRES_DB:-firecrawl}
    volumes:
      - firecrawl-nuq-postgres-data:/var/lib/postgresql/data
    init: true
    restart: always
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', '${FIRECRAWL_POSTGRES_USER:-firecrawl}', '-d', '${FIRECRAWL_POSTGRES_DB:-firecrawl}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    cpus: 1
    mem_limit: 2g
    security_opt:
      - no-new-privileges

volumes:
  firecrawl-nuq-postgres-data:

networks:
  stzky-ingress:
    external: true
