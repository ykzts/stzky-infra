services:
  firecrawl:
    command: ['node', 'dist/src/harness.js', '--start-docker']
    container_name: firecrawl
    image: ghcr.io/firecrawl/firecrawl:latest@sha256:e9a3af9de55059ab8dfc386a64b268c0730c1af4d24a6abcfa34d728ba08c471
    environment:
      HOST: 0.0.0.0
      PORT: 3002
      USE_DB_AUTHENTICATION: false
      REDIS_URL: redis://firecrawl-redis:6379
      REDIS_RATE_LIMIT_URL: redis://firecrawl-redis:6379
      PLAYWRIGHT_MICROSERVICE_URL: http://firecrawl-playwright:3000/scrape
      NUQ_RABBITMQ_URL: amqp://firecrawl-rabbitmq:5672
      POSTGRES_HOST: firecrawl-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${FIRECRAWL_POSTGRES_USER:-firecrawl}
      POSTGRES_PASSWORD: ${FIRECRAWL_POSTGRES_PASSWORD:-firecrawl_password}
      POSTGRES_DB: ${FIRECRAWL_POSTGRES_DB:-firecrawl}
      BULL_AUTH_KEY: ${FIRECRAWL_BULL_AUTH_KEY:-CHANGEME}
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 60s
      test: ['CMD', 'node', '-e', 'fetch(''http://127.0.0.1:3002/e2e-test'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))']
      timeout: 5s
    depends_on:
      firecrawl-redis:
        condition: service_started
      firecrawl-rabbitmq:
        condition: service_healthy
      firecrawl-playwright:
        condition: service_started
      firecrawl-postgres:
        condition: service_healthy
    networks:
      - default
      - stzky-ingress
    cpus: 2
    init: true
    mem_limit: 4g
    restart: always
    security_opt:
      - no-new-privileges

  firecrawl-playwright:
    container_name: firecrawl-playwright
    image: ghcr.io/firecrawl/playwright-service:latest@sha256:1f6eba6403207d501a63d9b1d4685b6316b4fc7968fe64a5839ab1bfec9d1c14
    environment:
      PORT: 3000
    cpus: 1
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 30s
      test: ['CMD', 'node', '-e', 'fetch(''http://127.0.0.1:3000/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))']
      timeout: 5s
    init: true
    mem_limit: 2g
    restart: always
    security_opt:
      - no-new-privileges

  firecrawl-redis:
    command: ['redis-server', '--bind', '0.0.0.0']
    container_name: firecrawl-redis
    cpus: 1
    image: redis:8.8-alpine@sha256:09160599abd229764c0fb44cb6be640294e1d360a54b19985ab4843dcf2d90f1
    healthcheck:
      interval: 5s
      retries: 5
      test: ['CMD', 'redis-cli', 'ping']
      timeout: 5s
    init: true
    mem_limit: 1g
    restart: always
    security_opt:
      - no-new-privileges

  firecrawl-rabbitmq:
    container_name: firecrawl-rabbitmq
    image: rabbitmq:4.3-management-alpine@sha256:c1a9d43038bb6151877e84bb6a488493158ad5c1f21dd5d1872f347caa8053b3
    init: true
    restart: always
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'check_running']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    cpus: 1
    mem_limit: 1g
    security_opt:
      - no-new-privileges

  firecrawl-postgres:
    command: ['postgres', '-c', 'cron.database_name=firecrawl']
    container_name: firecrawl-postgres
    image: ghcr.io/firecrawl/nuq-postgres:latest@sha256:f9388bd25ae2e1f1d034518236f993ce236173c1d8800ce24092ea6643a95a33
    environment:
      POSTGRES_USER: ${FIRECRAWL_POSTGRES_USER:-firecrawl}
      POSTGRES_PASSWORD: ${FIRECRAWL_POSTGRES_PASSWORD:-firecrawl_password}
      POSTGRES_DB: ${FIRECRAWL_POSTGRES_DB:-firecrawl}
    volumes:
      - firecrawl-nuq-postgres-data:/var/lib/postgresql/data
    init: true
    restart: always
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', '${FIRECRAWL_POSTGRES_USER:-firecrawl}', '-d', '${FIRECRAWL_POSTGRES_DB:-firecrawl}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    cpus: 1
    mem_limit: 2g
    security_opt:
      - no-new-privileges

volumes:
  firecrawl-nuq-postgres-data:

networks:
  stzky-ingress:
    external: true
