x-backend-variables: &backend-variables
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  AWS_S3_CUSTOM_DOMAIN: ${AWS_S3_CUSTOM_DOMAIN:-}
  AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-}
  AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-}
  AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
  BASEROW_PUBLIC_URL: https://base.stzky.com
  BASEROW_JWT_SIGNING_KEY: ${BASEROW_JWT_SIGNING_KEY:?}
  DATABASE_HOST: db
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:-baserow}
  DATABASE_PORT: '5432'
  DATABASE_USER: ${DATABASE_USER:-baserow}
  DATABASE_NAME: ${DATABASE_NAME:-baserow}
  EMAIL_SMTP: ${EMAIL_SMTP:-}
  EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-}
  EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}
  EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-}
  EMAIL_SMTP_USE_TLS: ${EMAIL_SMTP_USE_TLS:-}
  EMAIL_SMTP_USER: ${EMAIL_SMTP_USER:-}
  FROM_EMAIL: 'Baserow <no-reply@stzky.com>'
  PRIVATE_BACKEND_URL: http://backend:8000
  PUBLIC_BACKEND_URL: https://base.stzky.com
  PUBLIC_WEB_FRONTEND_URL: https://base.stzky.com
  REDIS_HOST: redis
  REDIS_PORT: '6379'
  SECRET_KEY: ${SECRET_KEY:?}

services:
  backend:
    container_name: baserow_backend
    depends_on:
      - db
      - redis
    environment:
      !!merge <<: *backend-variables
    image: baserow/backend:2.3.1@sha256:49e47509bdb2368f8b52f53f7c01251ac544704cfb3ff4f7f3a7b7d8fcb62ea4
    networks:
      - local
      - stzky-ingress
    restart: always

  web-frontend:
    container_name: baserow_web_frontend
    depends_on:
      - backend
    environment:
      BASEROW_PUBLIC_URL: https://base.stzky.com
      PRIVATE_BACKEND_URL: http://backend:8000
      PUBLIC_BACKEND_URL: https://base.stzky.com
    image: baserow/web-frontend:2.3.2@sha256:d616a12e66d6e172d504748c18400f1744fbc75d84b1bad44e41220483cf2591
    networks:
      - local
      - stzky-ingress
    restart: always

  celery:
    command: celery-worker
    container_name: baserow_celery
    depends_on:
      - db
      - redis
    environment:
      !!merge <<: *backend-variables
    healthcheck:
      test: ['CMD', '/baserow/backend/docker/docker-entrypoint.sh', 'celery-worker-healthcheck']
    image: baserow/backend:2.3.1@sha256:49e47509bdb2368f8b52f53f7c01251ac544704cfb3ff4f7f3a7b7d8fcb62ea4
    networks:
      - local
    restart: always

  celery-export-worker:
    command: celery-exportworker
    container_name: baserow_celery_export_worker
    depends_on:
      - db
      - redis
    environment:
      !!merge <<: *backend-variables
    healthcheck:
      test: ['CMD', '/baserow/backend/docker/docker-entrypoint.sh', 'celery-exportworker-healthcheck']
    image: baserow/backend:2.3.1@sha256:49e47509bdb2368f8b52f53f7c01251ac544704cfb3ff4f7f3a7b7d8fcb62ea4
    networks:
      - local
    restart: always

  celery-beat-worker:
    command: celery-beat
    container_name: baserow_celery_beat_worker
    depends_on:
      - db
      - redis
    environment:
      !!merge <<: *backend-variables
    healthcheck:
      test: ['CMD', '/baserow/backend/docker/docker-entrypoint.sh', 'celery-beat-healthcheck']
    image: baserow/backend:2.3.1@sha256:49e47509bdb2368f8b52f53f7c01251ac544704cfb3ff4f7f3a7b7d8fcb62ea4
    networks:
      - local
    restart: always
    stop_signal: SIGQUIT

  db:
    container_name: baserow_db
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-baserow}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-baserow}
      POSTGRES_USER: ${DATABASE_USER:-baserow}
    healthcheck:
      interval: 10s
      retries: 10
      test: ['CMD', 'su', 'postgres', '-c', 'pg_isready -U $$POSTGRES_USER']
    image: pgvector/pgvector:0.8.5-pg18-trixie@sha256:9d2e61c7352b9e9f4798df5fd9a498f043f4cda1cdacc707de3d198650f4321e
    networks:
      - local
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql

  redis:
    container_name: baserow_redis
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
    image: valkey/valkey:9.1-alpine3.23@sha256:c9b77919daeba2c02ad954d0c844cc4e7142069d177b89c5fd771f405daf9e02
    restart: always
    networks:
      - local

volumes:
  pgdata:

networks:
  local:
    driver: bridge
  stzky-ingress:
    external: true
