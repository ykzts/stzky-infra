services:
  roonserver:
    container_name: roonserver
    environment:
      ROON_INSTALL_BRANCH: production
    image: ghcr.io/roonlabs/roonserver:1.0.7@sha256:8deef4b11e04b869b0f33d1a216f27a0cd83106f1548a4dc3c666300f3be4652
    network_mode: host
    restart: always
    volumes:
      - roon-data:/Roon
      - ${ROON_SERVER_MUSIC_DIR}:/Music
      - ${ROON_SERVER_BACKUP_DIR}:/RoonBackups

  alloy:
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    container_name: roonserver_alloy
    image: grafana/alloy:v1.17.1@sha256:4f6ddc56ffdcf8a6316748fc5162972e20cb301523cac1bb4a31957df733ae9b
    networks:
      - stzky-ingress
    restart: always
    user: '0'
    volumes:
      - roon-data:/Roon:ro
      - ./config/alloy:/etc/alloy:ro

volumes:
  roon-data:

networks:
  stzky-ingress:
    external: true
