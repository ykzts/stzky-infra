services:
  alloy:
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    container_name: alloy
    environment:
      ALLOY_PROMETHEUS_PASSWORD: ${ALLOY_PROMETHEUS_PASSWORD}
      ALLOY_PROMETHEUS_USERNAME: ${ALLOY_PROMETHEUS_USERNAME}
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 30s
      test: ['CMD', 'bash', '-c', 'exec 3<>/dev/tcp/127.0.0.1/12345 && printf "GET /-/ready HTTP/1.0\r\n\r\n" >&3 && head -1 <&3 | grep -q 200']
      timeout: 5s
    image: grafana/alloy:v1.17.1@sha256:4f6ddc56ffdcf8a6316748fc5162972e20cb301523cac1bb4a31957df733ae9b
    networks:
      - default
      - stzky-ingress
    restart: always
    user: '0'
    volumes:
      - ./config/alloy:/etc/alloy:ro
      - alloy_data:/var/lib/alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro

  cadvisor:
    container_name: cadvisor
    devices:
      - /dev/kmsg:/dev/kmsg
    image: ghcr.io/google/cadvisor:0.57.0@sha256:e75bdb03b74b0b6995f208f166fead2e6e555dde73e44200113bb26f41b1981d
    privileged: true
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  database:
    container_name: grafana_postgres
    environment:
      POSTGRES_DB: ${GF_DATABASE_NAME}
      POSTGRES_PASSWORD: ${GF_DATABASE_PASSWORD}
      POSTGRES_USER: ${GF_DATABASE_USER}
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres']
    image: postgres:17.10-bookworm@sha256:4f736ae292687621d4dbe0d499ffd024a36bd2ee7d8ca6f2ccd4c800f047b394
    restart: always
    volumes:
      - /opt/grafana/postgres:/var/lib/postgresql/data

  grafana:
    container_name: grafana
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      GF_AUTH_DISABLE_LOGIN_FORM: true
      GF_DATABASE_HOST: ${GF_DATABASE_HOST}
      GF_DATABASE_NAME: ${GF_DATABASE_NAME}
      GF_DATABASE_PASSWORD: ${GF_DATABASE_PASSWORD}
      GF_DATABASE_TYPE: ${GF_DATABASE_TYPE}
      GF_DATABASE_USER: ${GF_DATABASE_USER}
      GF_REMOTE_CACHE_CONNSTR: ${GF_REMOTE_CACHE_CONNSTR}
      GF_REMOTE_CACHE_TYPE: redis
      GF_SECURITY_COOKIE_SECURE: true
      GF_SECURITY_COOKIE_SAMESITE: Strict
      GF_SECURITY_CONTENT_SECURITY_POLICY: true
      GF_SERVER_DOMAIN: graph.stzky.com
      GF_SERVER_ROOT_URL: https://graph.stzky.com
      GF_SERVER_ENABLE_GZIP: false
      GF_SMTP_ENABLED: true
      GF_SMTP_FROM_ADDRESS: ${GF_SMTP_FROM_ADDRESS}
      GF_SMTP_FROM_NAME: ${GF_SMTP_FROM_NAME}
      GF_SMTP_HOST: ${GF_SMTP_HOST}
      GF_SMTP_PASSWORD: ${GF_SMTP_PASSWORD}
      GF_SMTP_USER: ${GF_SMTP_FROM_NAME}
      GF_SNAPSHOTS_EXTERNAL_ENABLED: false
      GF_USERS_DEFAULT_THEME: system
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 30s
      test: ['CMD', 'wget', '--spider', '-q', '--tries=1', 'http://127.0.0.1:3000/api/health']
      timeout: 5s
    image: grafana/grafana:13.1.0@sha256:121a7a9ece6dc10b969f1f96eed64b4f07dfac0d0b8abc070f7cb83bbde86f63
    networks:
      - default
      - stzky-ingress
    restart: always
    user: '0'
    volumes:
      - /opt/grafana/grafana:/var/lib/grafana

  loki:
    command: -config.file=/etc/loki/local-config.yaml
    container_name: loki
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 30s
      test: ['CMD', '/bin/loki', '-health']
      timeout: 10s
    image: grafana/loki:3.7.3@sha256:70b9f699fc9bb868b62f1cfd4f787dfa50242f1fd92e6089787d5d7daea75fe8
    networks:
      - default
      - stzky-ingress
    restart: always
    volumes:
      - ./config/loki:/etc/loki:ro
      - loki_data:/loki

  node-exporter:
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    container_name: node_exporter
    image: prom/node-exporter:v1.11.1@sha256:e9cff4fc67b1818f8c97adb115b9f12c9a54b533de86765d4a0effc01b357205
    pid: host
    restart: always
    volumes:
      - /:/rootfs:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro

  prometheus:
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=60d
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    container_name: prometheus
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 10s
      test: ['CMD', 'wget', '--spider', '-q', '--tries=1', 'http://127.0.0.1:9090/-/healthy']
      timeout: 5s
    image: prom/prometheus:v3.13.0@sha256:c6b27ea434f8389bfe233fbc7be381cf50587c286e871bc842008f5a1b1908a7
    networks:
      - default
      - stzky-ingress
    restart: always
    volumes:
      - ./config/prometheus:/etc/prometheus:ro
      - /opt/grafana/prometheus:/prometheus

  redis:
    container_name: grafana_redis
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
    image: valkey/valkey:8.1.3-bookworm@sha256:fea8b3e67b15729d4bb70589eb03367bab9ad1ee89c876f54327fc7c6e618571
    restart: always
    volumes:
      - /opt/grafana/redis:/data

  snmp-exporter:
    container_name: snmp_exporter
    image: prom/snmp-exporter:v0.30.1@sha256:e5fd5e8b43ace6c088fe9bf0b37b7fff0e04380bee352be7ec41b853a4dd5859
    restart: always

networks:
  stzky-ingress:
    external: true

volumes:
  alloy_data:
  loki_data:
