services:
  gateway:
    container_name: mcp-gateway
    image: docker/mcp-gateway:v0.43.0@sha256:3915e06c07b10abb5bb3f5627ef426fff90e91d7b3e90553a0c1b6e767bc0c7d
    networks:
      - default
      - stzky-ingress
    command:
      - --transport=streaming
      - --servers=firecrawl,grafana
      - --port=8811
      - --static=true
    depends_on:
      - mcp-firecrawl
      - mcp-grafana
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 30s
      test: ['CMD', 'wget', '--spider', '-q', '--tries=1', 'http://127.0.0.1:8811/health']
      timeout: 5s
    restart: always

  mcp-firecrawl:
    container_name: mcp-firecrawl
    entrypoint: ['/docker-mcp/misc/docker-mcp-bridge', 'node', 'dist/index.js']
    image: mcp/firecrawl:latest@sha256:bd3d3a3a71a7803b61255447072db65835fe82558749ac2297a33806da3a327e
    environment:
      FIRECRAWL_API_URL: ${FIRECRAWL_API_URL:-http://firecrawl:3002}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
    healthcheck:
      interval: 10s
      retries: 5
      test: ['CMD', 'node', '-e', 'process.kill(1,0)']
      timeout: 5s
    networks:
      - default
      - stzky-ingress
    cpus: 1
    init: true
    mem_limit: 2g
    security_opt:
      - no-new-privileges
    labels:
      - docker-mcp=true
      - docker-mcp-tool-type=mcp
      - docker-mcp-name=firecrawl
      - docker-mcp-transport=stdio
    volumes:
      - type: image
        source: docker/mcp-gateway
        target: /docker-mcp
    restart: always

  mcp-grafana:
    container_name: mcp-grafana
    entrypoint: ['/docker-mcp/misc/docker-mcp-bridge', '/app/mcp-grafana', '--transport', 'stdio']
    image: mcp/grafana:latest@sha256:3ad1ef6d41ea0f69ca38a50f89f64b2a3b804d910eb9e397e0735cc677a14cbe
    environment:
      GRAFANA_API_URL: ${GRAFANA_API_URL:-http://grafana:3000}
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${GRAFANA_SERVICE_ACCOUNT_TOKEN:-}
    healthcheck:
      interval: 10s
      retries: 5
      test: ['CMD', 'sh', '-c', 'kill -0 1']
      timeout: 5s
    networks:
      - default
      - stzky-ingress
    cpus: 1
    init: true
    mem_limit: 2g
    security_opt:
      - no-new-privileges
    labels:
      - docker-mcp=true
      - docker-mcp-tool-type=mcp
      - docker-mcp-name=grafana
      - docker-mcp-transport=stdio
    volumes:
      - type: image
        source: docker/mcp-gateway
        target: /docker-mcp
    restart: always

networks:
  stzky-ingress:
    external: true
