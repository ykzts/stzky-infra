services:
  gateway:
    container_name: mcp-gateway
    image: docker/mcp-gateway:v0.43.3@sha256:e3ee13818cb067a506c5e9acdb2bb4fe0e601caef7d116fc329755782f1a3cfa
    environment:
      MCP_GATEWAY_AUTH_TOKEN: ${MCP_GATEWAY_AUTH_TOKEN:-}
    networks:
      - default
      - stzky-ingress
    command:
      - --transport=streaming
      - --servers=firecrawl,grafana
      - --port=8811
      - --static=true
    depends_on:
      - mcp-firecrawl
      - mcp-grafana
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 30s
      test: ['CMD', 'wget', '--spider', '-q', '--tries=1', 'http://127.0.0.1:8811/health']
      timeout: 5s
    restart: always

  mcp-firecrawl:
    container_name: mcp-firecrawl
    entrypoint: ['/docker-mcp/misc/docker-mcp-bridge', 'node', 'dist/index.js']
    image: mcp/firecrawl:latest@sha256:28e677a10704596526b1fbeb8105d1930cc7500648433216ce6937e03b20516c
    environment:
      FIRECRAWL_API_URL: ${FIRECRAWL_API_URL:-http://firecrawl:3002}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
    healthcheck:
      interval: 10s
      retries: 5
      test: ['CMD', 'node', '-e', 'process.kill(1,0)']
      timeout: 5s
    networks:
      - default
      - stzky-ingress
    cpus: 1
    init: true
    mem_limit: 2g
    security_opt:
      - no-new-privileges
    labels:
      - docker-mcp=true
      - docker-mcp-tool-type=mcp
      - docker-mcp-name=firecrawl
      - docker-mcp-transport=stdio
    volumes:
      - type: image
        source: docker/mcp-gateway
        target: /docker-mcp
    restart: always

  mcp-grafana:
    container_name: mcp-grafana
    entrypoint: ['/docker-mcp/misc/docker-mcp-bridge', '/app/mcp-grafana', '--transport', 'stdio']
    image: mcp/grafana:latest@sha256:9362bcf6aa0e44e61f645b905cec03fb346a946a34a4dafecd7f3e28d3724014
    environment:
      GRAFANA_API_URL: ${GRAFANA_API_URL:-http://grafana:3000}
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${GRAFANA_SERVICE_ACCOUNT_TOKEN:-}
    healthcheck:
      interval: 10s
      retries: 5
      test: ['CMD', 'sh', '-c', 'kill -0 1']
      timeout: 5s
    networks:
      - default
      - stzky-ingress
    cpus: 1
    init: true
    mem_limit: 2g
    security_opt:
      - no-new-privileges
    labels:
      - docker-mcp=true
      - docker-mcp-tool-type=mcp
      - docker-mcp-name=grafana
      - docker-mcp-transport=stdio
    volumes:
      - type: image
        source: docker/mcp-gateway
        target: /docker-mcp
    restart: always

networks:
  stzky-ingress:
    external: true
