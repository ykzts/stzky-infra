services:
  ovms:
    command: >
      --source_model OpenVINO/Qwen3.5-9B-int4-ov
      --model_name qwen3.5-9b
      --model_repository_path /models
      --task text_generation
      --target_device GPU
      --rest_port 8000
      --max_num_batched_tokens 32768
      --cache_size 8
    container_name: ovms
    devices:
      - /dev/dri:/dev/dri
    environment:
      HF_TOKEN: ${HF_TOKEN}
    group_add:
      - '993'
    image: openvino/model_server:2026.2-gpu@sha256:fdc34725b35d79cde23cff1967f90efb40237b7cf5545a70460209056f3da733
    restart: always
    shm_size: 16gb
    volumes:
      - ovms-models:/models

  db:
    container_name: open-webui-db
    image: pgvector/pgvector:0.8.2-pg18-trixie@sha256:b7337db8fe39d12fe8ecb0003c72680f24479813a744b43154eee6f2eab5a5f3
    environment:
      POSTGRES_USER: webui
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: openwebui
    restart: always
    volumes:
      - pg-data:/var/lib/postgresql

  open-webui:
    container_name: open-webui
    depends_on:
      - ovms
      - db
    environment:
      DATABASE_URL: postgresql://webui:${DB_PASSWORD}@db:5432/openwebui
      ENABLE_SIGNUP: ${ENABLE_SIGNUP:-False}
      HF_TOKEN: ${HF_TOKEN}
      PGVECTOR_DB_URL: postgresql://webui:${DB_PASSWORD}@db:5432/openwebui
      VECTOR_DB: pgvector
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-}
    image: ghcr.io/open-webui/open-webui:v0.9.6@sha256:90eae5b419e40b4c3dd684582b2c83440b36f9ae2f6532c09639b2ba4ee65158
    networks:
      - default
      - stzky-ingress
    restart: always
    volumes:
      - open-webui-data:/app/backend/data

volumes:
  ovms-models:
  pg-data:
  open-webui-data:

networks:
  stzky-ingress:
    external: true
