services:
  n8n:
    container_name: n8n
    depends_on:
      n8n-db:
        condition: service_healthy
    image: docker.n8n.io/n8nio/n8n:2.27.4@sha256:cf11c96b0d0089bb24459bf97b445fd7008f41543b673cce4d955f7c0ed8752d
    environment:
      DB_POSTGRESDB_HOST: n8n-db
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-n8n}
      DB_POSTGRESDB_PORT: '5432'
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_TYPE: postgresdb
      GENERIC_TIMEZONE: Asia/Tokyo
      N8N_EDITOR_BASE_URL: https://flow.stzky.com
      N8N_EMAIL_MODE: smtp
      N8N_HOST: flow.stzky.com
      N8N_PROTOCOL: https
      N8N_PROXY_HOPS: '1'
      N8N_SMTP_HOST: ${N8N_SMTP_HOST:-}
      N8N_SMTP_PASS: ${N8N_SMTP_PASS:-}
      N8N_SMTP_PORT: ${N8N_SMTP_PORT:-}
      N8N_SMTP_SENDER: ${N8N_SMTP_SENDER:-}
      N8N_SMTP_SSL: 'false'
      N8N_SMTP_STARTTLS: 'true'
      N8N_SMTP_USER: ${N8N_SMTP_USER:-}
      VUE_APP_URL_BASE_API: https://flow.stzky.com
      WEBHOOK_URL: https://flow.stzky.com
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 30s
      test: ['CMD', 'wget', '--spider', '-q', '--tries=1', 'http://127.0.0.1:5678/healthz']
      timeout: 5s
    networks:
      - default
      - stzky-ingress
    restart: always
    volumes:
      - n8n_data:/home/node/.n8n

  n8n-db:
    container_name: n8n_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
    healthcheck:
      interval: 10s
      retries: 5
      test: ['CMD', 'pg_isready', '-U', '$$POSTGRES_USER', '-d', '$$POSTGRES_DB']
      timeout: 5s
    image: postgres:18.4-alpine3.23@sha256:996d0920e4ff9df1fc19dacb904492f3c1ec0ec1cc338f0ad7123be7731c5f5e
    restart: always
    volumes:
      - pg_data:/var/lib/postgresql

volumes:
  n8n_data:
  pg_data:

networks:
  stzky-ingress:
    external: true
