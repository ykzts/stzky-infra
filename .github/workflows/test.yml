name: Test Compose Services

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubicloud-standard-2
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            baserow:
              - 'services/baserow/**'
            caddy:
              - 'services/caddy/**'
            epub-web:
              - 'services/epub-web/**'
            firecrawl:
              - 'services/firecrawl/**'
            grafana:
              - 'services/grafana/**'
            homepage:
              - 'services/homepage/**'
            immich:
              - 'services/immich/**'
            mcp-gateway:
              - 'services/mcp-gateway/**'
            n8n:
              - 'services/n8n/**'
            shared:
              - 'scripts/**'
              - '.github/workflows/test.yml'
              - '.devcontainer/**'

      - name: Set test matrix
        id: set-matrix
        env:
          FILTER_BASEROW: ${{ steps.filter.outputs.baserow }}
          FILTER_CADDY: ${{ steps.filter.outputs.caddy }}
          FILTER_EPUB_WEB: ${{ steps.filter.outputs.epub-web }}
          FILTER_FIRECRAWL: ${{ steps.filter.outputs.firecrawl }}
          FILTER_GRAFANA: ${{ steps.filter.outputs.grafana }}
          FILTER_HOMEPAGE: ${{ steps.filter.outputs.homepage }}
          FILTER_IMMICH: ${{ steps.filter.outputs.immich }}
          FILTER_MCP_GATEWAY: ${{ steps.filter.outputs.mcp-gateway }}
          FILTER_N8N: ${{ steps.filter.outputs.n8n }}
          FILTER_SHARED: ${{ steps.filter.outputs.shared }}
        run: |
          if [ "$FILTER_SHARED" = "true" ]; then
            matrix='["baserow","caddy","epub-web","firecrawl","grafana","homepage","immich","mcp-gateway","n8n"]'
          else
            selected=()
            [ "$FILTER_BASEROW" = "true" ] && selected+=(baserow)
            [ "$FILTER_CADDY" = "true" ] && selected+=(caddy)
            [ "$FILTER_EPUB_WEB" = "true" ] && selected+=(epub-web)
            [ "$FILTER_FIRECRAWL" = "true" ] && selected+=(firecrawl)
            [ "$FILTER_GRAFANA" = "true" ] && selected+=(grafana)
            [ "$FILTER_HOMEPAGE" = "true" ] && selected+=(homepage)
            [ "$FILTER_IMMICH" = "true" ] && selected+=(immich)
            [ "$FILTER_MCP_GATEWAY" = "true" ] && selected+=(mcp-gateway)
            [ "$FILTER_N8N" = "true" ] && selected+=(n8n)

            if [ ${#selected[@]} -eq 0 ]; then
              matrix='[]'
            else
              matrix=$(printf '%s\n' "${selected[@]}" | jq -R . | jq -sc .)
            fi
          fi

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Test matrix: $matrix"

  test-compose:
    name: Test ${{ matrix.service }}
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '[]'
    runs-on: ubicloud-standard-2
    timeout-minutes: 15
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.service }}
      cancel-in-progress: true
    strategy:
      # Don't cancel all jobs if one fails - we want to test all services
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Bootstrap environment
        run: ./scripts/bootstrap.sh

      - name: Prepare host directories for ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: |
          # Some services use bind mounts to fixed absolute paths on the host
          # (outside the project tree). These directories must exist before `up`.
          case "${{ matrix.service }}" in
            grafana)
              sudo mkdir -p /opt/grafana/{postgres,grafana,prometheus,redis}
              sudo chmod 777 /opt/grafana/{postgres,grafana,prometheus,redis}
              ;;
            immich)
              mkdir -p /tmp/immich-db /tmp/immich-upload
              ;;
          esac

      - name: Setup compose files
        run: ./scripts/setup-compose-test-env.sh services/${{ matrix.service }}

      - name: Start Docker Compose
        working-directory: services/${{ matrix.service }}
        run: |
          docker compose up -d

      - name: Wait for services to be healthy
        working-directory: services/${{ matrix.service }}
        timeout-minutes: 5
        run: |
          # Get list of all services
          services=$(docker compose ps --services)

          echo "Waiting for services to be ready..."

          # Maximum wait time in seconds
          max_wait=300
          elapsed=0
          interval=5

          while [ $elapsed -lt $max_wait ]; do
            all_healthy=true

            for service in $services; do
              # Get container name
              container=$(docker compose ps -q $service)

              if [ -z "$container" ]; then
                echo "❌ Service $service: container not found"
                all_healthy=false
                continue
              fi

              # Check container status
              status=$(docker inspect --format='{{.State.Status}}' $container 2>/dev/null || echo "not found")
              health=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' $container 2>/dev/null || echo "none")

              if [ "$status" != "running" ]; then
                echo "❌ Service $service: status=$status (expected: running)"
                all_healthy=false
              elif [ "$health" = "none" ]; then
                echo "✅ Service $service: running (no healthcheck)"
              elif [ "$health" = "healthy" ]; then
                echo "✅ Service $service: $health"
              elif [ "$health" = "unhealthy" ]; then
                echo "❌ Service $service: $health"
                all_healthy=false
              else
                echo "⏳ Service $service: $health"
                all_healthy=false
              fi
            done

            if [ "$all_healthy" = true ]; then
              echo ""
              echo "🎉 All services are ready!"
              exit 0
            fi

            sleep $interval
            elapsed=$((elapsed + interval))
            echo ""
          done

          echo "❌ Timeout: Services did not become healthy within ${max_wait}s"
          echo ""
          echo "Final status:"
          docker compose ps
          echo ""
          echo "Logs:"
          docker compose logs --tail=50
          exit 1

      - name: Show service status
        if: always()
        working-directory: services/${{ matrix.service }}
        run: |
          echo "Service status:"
          docker compose ps
          echo ""
          echo "Service logs (last 100 lines):"
          docker compose logs --tail=100

      - name: Cleanup
        if: always()
        working-directory: services/${{ matrix.service }}
        run: |-
          docker compose down -v

  compose-tests:
    name: Compose tests
    needs: [detect-changes, test-compose]
    if: always()
    runs-on: ubicloud-standard-2
    steps:
      - name: Aggregate compose test results
        run: |-
          if [[ "${{ needs.detect-changes.result }}" == "failure" || "${{ needs.detect-changes.result }}" == "cancelled" ]]; then
            echo "detect-changes job failed or was cancelled"
            exit 1
          fi

          if [[ "${{ needs.test-compose.result }}" == "failure" || "${{ needs.test-compose.result }}" == "cancelled" ]]; then
            echo "test-compose job failed or was cancelled"
            exit 1
          fi

          echo "Compose tests passed"
