name: Test Compose Services

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-compose:
    name: Test ${{ matrix.service }}
    runs-on: ubicloud-standard-2
    timeout-minutes: 15
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.service }}
      cancel-in-progress: true
    strategy:
      # Don't cancel all jobs if one fails - we want to test all services
      fail-fast: false
      matrix:
        service:
          - caddy
          - epub-web
          - firecrawl
          - grafana
          - homepage
          - immich
          - mcp-gateway
          - n8n

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Bootstrap environment
        run: ./scripts/bootstrap.sh

      - name: Prepare host directories for ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: |
          # Some services use bind mounts to fixed absolute paths on the host
          # (outside the project tree). These directories must exist before `up`.
          case "${{ matrix.service }}" in
            grafana)
              sudo mkdir -p /opt/grafana/{postgres,grafana,prometheus,redis}
              sudo chmod 777 /opt/grafana/{postgres,grafana,prometheus,redis}
              ;;
            immich)
              mkdir -p /tmp/immich-db /tmp/immich-upload
              ;;
          esac

      - name: Setup compose files
        working-directory: services/${{ matrix.service }}
        run: |
          # Use compose.test.yaml if it exists (for test-specific overrides such as
          # healthchecks, ports, profiles, or volumes).
          if [ -f compose.test.yaml ]; then
            echo "COMPOSE_FILE=compose.yaml:compose.test.yaml" >> $GITHUB_ENV
          fi

          # Use .env.test for Compose variable interpolation if present.
          # This is set via COMPOSE_ENV_FILES (symmetric to COMPOSE_FILE) so that
          # all subsequent `docker compose` commands in the job inherit it.
          # No need to cp .env.test to .env anymore.
          if [ -f .env.test ]; then
            echo "COMPOSE_ENV_FILES=.env.test" >> $GITHUB_ENV
          fi

      - name: Start Docker Compose
        working-directory: services/${{ matrix.service }}
        run: |
          docker compose up -d

      - name: Wait for services to be healthy
        working-directory: services/${{ matrix.service }}
        timeout-minutes: 5
        run: |
          # Get list of all services
          services=$(docker compose ps --services)

          echo "Waiting for services to be ready..."

          # Maximum wait time in seconds
          max_wait=300
          elapsed=0
          interval=5

          while [ $elapsed -lt $max_wait ]; do
            all_healthy=true

            for service in $services; do
              # Get container name
              container=$(docker compose ps -q $service)

              if [ -z "$container" ]; then
                echo "❌ Service $service: container not found"
                all_healthy=false
                continue
              fi

              # Check container status
              status=$(docker inspect --format='{{.State.Status}}' $container 2>/dev/null || echo "not found")
              health=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' $container 2>/dev/null || echo "none")

              if [ "$status" != "running" ]; then
                echo "❌ Service $service: status=$status (expected: running)"
                all_healthy=false
              elif [ "$health" = "none" ]; then
                echo "✅ Service $service: running (no healthcheck)"
              elif [ "$health" = "healthy" ]; then
                echo "✅ Service $service: $health"
              elif [ "$health" = "unhealthy" ]; then
                echo "❌ Service $service: $health"
                all_healthy=false
              else
                echo "⏳ Service $service: $health"
                all_healthy=false
              fi
            done

            if [ "$all_healthy" = true ]; then
              echo ""
              echo "🎉 All services are ready!"
              exit 0
            fi

            sleep $interval
            elapsed=$((elapsed + interval))
            echo ""
          done

          echo "❌ Timeout: Services did not become healthy within ${max_wait}s"
          echo ""
          echo "Final status:"
          docker compose ps
          echo ""
          echo "Logs:"
          docker compose logs --tail=50
          exit 1

      - name: Show service status
        if: always()
        working-directory: services/${{ matrix.service }}
        run: |
          echo "Service status:"
          docker compose ps
          echo ""
          echo "Service logs (last 100 lines):"
          docker compose logs --tail=100

      - name: Cleanup
        if: always()
        working-directory: services/${{ matrix.service }}
        run: |-
          docker compose down -v
