name: Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  yamlfmt:
    name: YAML format
    runs-on: ubicloud-standard-2
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install yamlfmt
        run: |
          curl -fsSLo yamlfmt.tar.gz "https://github.com/google/yamlfmt/releases/download/v0.21.0/yamlfmt_0.21.0_Linux_x86_64.tar.gz"
          tar -xzf yamlfmt.tar.gz yamlfmt
          sudo install yamlfmt /usr/local/bin/yamlfmt

      - name: Check YAML formatting
        run: yamlfmt -lint .

  compose-config:
    name: Compose config (${{ matrix.service }})
    runs-on: ubicloud-standard-2
    strategy:
      fail-fast: false
      matrix:
        service:
          - baserow
          - caddy
          - epub-web
          - firecrawl
          - grafana
          - homepage
          - immich
          - mcp-gateway
          - n8n
          - open-webui
          - roonserver
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup compose files
        run: ./scripts/setup-compose-test-env.sh services/${{ matrix.service }}

      - name: Validate compose configuration
        working-directory: services/${{ matrix.service }}
        run: docker compose config --quiet

  lint:
    name: Lint
    needs: [yamlfmt, compose-config]
    if: always()
    runs-on: ubicloud-standard-2
    steps:
      - name: Aggregate lint results
        run: |-
          if [[ "${{ needs.yamlfmt.result }}" == "failure" || "${{ needs.yamlfmt.result }}" == "cancelled" ]]; then
            echo "yamlfmt job failed or was cancelled"
            exit 1
          fi

          if [[ "${{ needs.compose-config.result }}" == "failure" || "${{ needs.compose-config.result }}" == "cancelled" ]]; then
            echo "compose-config job failed or was cancelled"
            exit 1
          fi

          echo "Lint passed"
