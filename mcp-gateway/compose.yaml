services:
  gateway:
    container_name: mcp-gateway
    image: docker/mcp-gateway:v0.42.1@sha256:582c83ba9b6032a6f495d0e98e7ff6442eebe89f7c476fa7672ce115911c99c5
    networks:
      - default
      - stzky-ingress
    command:
      - --transport=streaming
      - --servers=firecrawl
      - --port=8811
      - --static=true
    depends_on:
      - mcp-firecrawl

  mcp-firecrawl:
    container_name: mcp-firecrawl
    image: mcp/firecrawl@sha256:bd3d3a3a71a7803b61255447072db65835fe82558749ac2297a33806da3a327e
    entrypoint: ["/docker-mcp/misc/docker-mcp-bridge", "node", "dist/index.js"]
    environment:
      - FIRECRAWL_API_URL=${FIRECRAWL_API_URL:-http://firecrawl:3002}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
    depends_on:
      firecrawl:
        condition: service_started
    networks:
      - default
      - stzky-ingress
    init: true
    cpus: 1
    mem_limit: 2g
    security_opt:
      - no-new-privileges
    labels:
      - docker-mcp=true
      - docker-mcp-tool-type=mcp
      - docker-mcp-name=firecrawl
      - docker-mcp-transport=stdio
    volumes:
      - type: image
        source: docker/mcp-gateway
        target: /docker-mcp

networks:
  stzky-ingress:
    external: true
