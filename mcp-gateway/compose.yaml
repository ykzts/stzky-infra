services:
  gateway:
    container_name: mcp-gateway
    image: docker/mcp-gateway:v0.42.1@sha256:582c83ba9b6032a6f495d0e98e7ff6442eebe89f7c476fa7672ce115911c99c5
    networks:
      - default
      - stzky-ingress
    command:
      - --transport=streaming
      - --servers=firecrawl
      - --port=8811
      - --static=true
    depends_on:
      - mcp-firecrawl
      - mcp-grafana
    restart: always

  mcp-firecrawl:
    container_name: mcp-firecrawl
    image: mcp/firecrawl:latest@sha256:bd3d3a3a71a7803b61255447072db65835fe82558749ac2297a33806da3a327e
    entrypoint: ["/docker-mcp/misc/docker-mcp-bridge", "node", "dist/index.js"]
    environment:
      - FIRECRAWL_API_URL=${FIRECRAWL_API_URL:-http://firecrawl:3002}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
    networks:
      - default
      - stzky-ingress
    init: true
    cpus: 1
    mem_limit: 2g
    security_opt:
      - no-new-privileges
    labels:
      - docker-mcp=true
      - docker-mcp-tool-type=mcp
      - docker-mcp-name=firecrawl
      - docker-mcp-transport=stdio
    volumes:
      - type: image
        source: docker/mcp-gateway
        target: /docker-mcp
    restart: always

  mcp-grafana:
    container_name: mcp-grafana
    image: mcp/grafana:latest@sha256:55abb94eb96ccf1c5bfbe400ddce3327751e47c7e74fc53388c4a9d96aa7b1a5
    entrypoint: ["/docker-mcp/misc/docker-mcp-bridge", "uvx", "mcp-grafana"]
    environment:
      - GRAFANA_API_URL=${GRAFANA_API_URL:-http://grafana:3000}
      - GRAFANA_SERVICE_ACCOUNT_TOKEN=${GRAFANA_SERVICE_ACCOUNT_TOKEN:-}
    networks:
      - default
      - stzky-ingress
    init: true
    cpus: 1
    mem_limit: 2g
    security_opt:
      - no-new-privileges
    labels:
      - docker-mcp=true
      - docker-mcp-tool-type=mcp
      - docker-mcp-name=grafana
      - docker-mcp-transport=stdio
    volumes:
      - type: image
        source: docker/mcp-gateway
        target: /docker-mcp
    restart: always

networks:
  stzky-ingress:
    external: true
